# Nginx reverse proxy para JustDoIt
# Copiar para: /etc/nginx/sites-available/justdoit
# Depois: sudo ln -s /etc/nginx/sites-available/justdoit /etc/nginx/sites-enabled/
# Frontend: hospedado no GitHub Pages em justdoit-app.duckdns.org (via CNAME no repo)

# --- API (justdoitapi.duckdns.org) ---
server {
    listen 80;
    server_name justdoitapi.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name justdoitapi.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/justdoitapi.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/justdoitapi.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "no-referrer" always;

    # Não expor a versão do nginx
    server_tokens off;

    # auth-service (porta 8080): /auth/**, /users/**
    location ~ ^/(auth|users)(/|$) {
        proxy_pass         http://localhost:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # task-service (porta 8081): /tasks/**, /categories/**, /notes/**
    location ~ ^/(tasks|categories|notes)(/|$) {
        proxy_pass         http://localhost:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Bloco de anotação fixado no topo do To Do (task-service, 8081).
    # /me/data (purga de dados) NÃO é roteado aqui: é chamada interna auth->task.
    location = /me/note {
        proxy_pass         http://localhost:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # /analytics/categories → task-service (8081); deve vir ANTES do bloco analytics genérico
    location = /analytics/categories {
        proxy_pass         http://localhost:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # schedule-service (porta 8082): /events/**, /time-blocks/**, /weekly-plans/**, /analytics/**
    location ~ ^/(events|time-blocks|weekly-plans|analytics)(/|$) {
        proxy_pass         http://localhost:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # notification-service (porta 8083): /notifications/**
    location ~ ^/notifications(/|$) {
        proxy_pass         http://localhost:8083;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
