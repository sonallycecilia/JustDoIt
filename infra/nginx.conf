# Nginx reverse proxy para JustDoIt — substitua SEU_SUBDOMINIO pelo seu DuckDNS
# Copiar para: /etc/nginx/sites-available/justdoit
# Depois: sudo ln -s /etc/nginx/sites-available/justdoit /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name justdoitapi.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name justdoitapi.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/justdoitapi.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/justdoitapi.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # auth-service (porta 8080): /auth/**, /users/**
    location ~ ^/(auth|users)(/|$) {
        proxy_pass         http://localhost:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # task-service (porta 8081): /tasks/**, /categories/**
    location ~ ^/(tasks|categories)(/|$) {
        proxy_pass         http://localhost:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # /analytics/categories → task-service (8081); deve vir ANTES do bloco analytics genérico
    location = /analytics/categories {
        proxy_pass         http://localhost:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # schedule-service (porta 8082): /events/**, /time-blocks/**, /weekly-plans/**, /analytics/**
    location ~ ^/(events|time-blocks|weekly-plans|analytics)(/|$) {
        proxy_pass         http://localhost:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # notification-service (porta 8083): /notifications/**
    location ~ ^/notifications(/|$) {
        proxy_pass         http://localhost:8083;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
