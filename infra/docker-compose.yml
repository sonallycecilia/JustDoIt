version: '3.8'
services:
  mysql-justdoit:
    image: mysql:8.0
    container_name: db_justdoit
    environment:
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      MYSQL_DATABASE: justdoit_db
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis-justdoit:
    image: redis:alpine
    container_name: cache_justdoit
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped

volumes:
  mysql_data: