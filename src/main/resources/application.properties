spring.application.name=backend

# Conexao com o MySQL do Docker
spring.datasource.url=jdbc:mysql://localhost:3306/justdoit_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# Cria as tabelas baseadas nas entidades Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Conexao com o Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
security.jwt.secret=${JWT_SECRET:justdoit-dev-secret-change-me-32bytes}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
