server:
  port: 8081

spring:
  application:
    name: task-service
  datasource:
    url: jdbc:mysql://localhost:3306/justdoit_db?createDatabaseIfNotExist=true
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  notification-service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}
  # Segredo do endpoint interno do notification-service (fluxos sem usuário,
  # ex.: job de tarefas atrasadas). Vazio = job marca OVERDUE mas não notifica.
  internal-token: ${INTERNAL_API_TOKEN:}
