# Valores apenas para a execução de testes — não usados em produção.
# H2 em memória (modo MySQL) para testes de integração sem MySQL externo,
# espelhando o application-test.yml do auth-service.
spring:
  datasource:
    url: jdbc:h2:mem:taskdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
jwt:
  secret: test-secret-key-please-change-256-bits-minimum-0123456789abcdef
