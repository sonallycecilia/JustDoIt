server:
  port: 8080

spring:
  application:
    name: auth-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:mysql://localhost:3306/justdoit_db?createDatabaseIfNotExist=true
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}      # 15 min
  refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 dias

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  task-service:
    url: ${TASK_SERVICE_URL:http://localhost:8081}

auth:
  rate-limit: # por IP, apenas nos endpoints públicos (login/register/refresh/check-email)
    enabled: ${AUTH_RATE_LIMIT_ENABLED:true}
    capacity: ${AUTH_RATE_LIMIT_CAPACITY:20}            # rajada máxima
    refill-per-minute: ${AUTH_RATE_LIMIT_REFILL:20}     # reposição sustentada
